<svg width="520" height="110" viewBox="0 0 520 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#1E293B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <!-- Fade masks at strip edges -->
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>

    <!-- Clip to visible strip area only -->
    <clipPath id="mc">
      <rect x="2" y="57" width="516" height="51"/>
    </clipPath>

    <style>
      /* One full set = 1870px. Animate by exactly that much for seamless loop. */
      @keyframes scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-1870px); }
      }
      @keyframes breathe { 0%,100%{opacity:.5} 50%{opacity:.9} }
      .tr { animation: scroll 32s linear infinite; }
      .bx { animation: breathe 4s ease-in-out infinite; }
    </style>
  </defs>


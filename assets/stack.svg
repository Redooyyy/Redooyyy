  <rect x="2" y="2" width="516" height="106" rx="14" fill="#0d1117" fill-opacity="0.85"/>
  <rect x="2" y="2" width="516" height="106" rx="14" fill="none" stroke="url(#ob)" stroke-width="1.5" class="bx"/>


<svg width="900" height="2" viewBox="0 0 900 2" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sep" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00F7FF" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00F7FF" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#00F7FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00F7FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="900" height="2" fill="url(#sep)" filter="url(#glow)"/>
</svg>

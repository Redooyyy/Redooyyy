<svg width="124" height="44" viewBox="0 0 124 44" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA4335" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FBBC04" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34A853" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#EA4335" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <style>
      @keyframes breathe {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      .b { animation: breathe 3.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="2" y="2" width="120" height="40" rx="12" fill="#0d1117" fill-opacity="0.9"/>
  <rect x="2" y="2" width="120" height="40" rx="12" fill="url(#bgGlow)"/>

  <!-- Glowing border -->
  <rect x="2" y="2" width="120" height="40" rx="12" fill="none" stroke="url(#glow)" stroke-width="1.5" filter="url(#blur)" class="b"/>

  <!-- Gmail M icon -->
  <g transform="translate(12, 10)">
    <path d="M2 6C2 4.895 2.895 4 4 4h16c1.105 0 2 .895 2 2v12c0 1.105-.895 2-2 2H4c-1.105 0-2-.895-2-2V6z" fill="none" stroke="#E2E8F0" stroke-width="1.4"/>
    <polyline points="2,6 12,13 22,6" fill="none" stroke="#E2E8F0" stroke-width="1.4" stroke-linejoin="round"/>
  </g>

  <text x="44" y="27" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#E2E8F0" letter-spacing="1">GMAIL</text>
</svg>

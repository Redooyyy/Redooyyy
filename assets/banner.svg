<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#151520"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00F7FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="15"/>
  
  <!-- Abstract Shapes -->
  <circle cx="100" cy="50" r="150" fill="#00F7FF" opacity="0.05" filter="url(#glow)"/>
  <circle cx="700" cy="250" r="100" fill="#7000FF" opacity="0.05" filter="url(#glow)"/>
  
  <!-- Text -->
  <text x="400" y="110" font-family="'JetBrains Mono', monospace, Arial" font-size="48" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">Hey, I'm Redoy</text>
  
  <text x="400" y="160" font-family="'Outfit', sans-serif, Arial" font-size="18" fill="#a0a0b0" text-anchor="middle">Crafting backend spells, decoding algorithms, and sketching emotions in pixels.</text>
  
  <text x="400" y="210" font-family="'Outfit', sans-serif, Arial" font-size="16" font-style="italic" fill="#00F7FF" text-anchor="middle" opacity="0.8">"I write in silence, where logic meets longing—"</text>
  <text x="400" y="240" font-family="'Outfit', sans-serif, Arial" font-size="16" font-style="italic" fill="#00F7FF" text-anchor="middle" opacity="0.8">"and every bug is a metaphor."</text>
  
  <!-- Decorative Code Dots -->
  <circle cx="30" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="30" r="6" fill="#27c93f"/>
</svg>

<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft floating aurora orbs -->
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Chrome name gradient -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Subtle divider -->
    <linearGradient id="div" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for name -->
    <filter id="nameGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <style>
      @keyframes float1 {
        0%,100% { transform: translate(0px, 0px) scale(1); }
        33%      { transform: translate(30px, -25px) scale(1.08); }
        66%      { transform: translate(-20px, 15px) scale(0.96); }
      }
      @keyframes float2 {
        0%,100% { transform: translate(0px, 0px) scale(1); }
        33%      { transform: translate(-35px, 20px) scale(1.1); }
        66%      { transform: translate(25px, -15px) scale(0.95); }
      }
      @keyframes float3 {
        0%,100% { transform: translate(0px, 0px) scale(1); }
        50%      { transform: translate(15px, -30px) scale(1.05); }
      }
      @keyframes fadein {
        0%   { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .o1 { animation: float1 9s ease-in-out infinite; transform-origin: 150px 130px; }
      .o2 { animation: float2 12s ease-in-out infinite; transform-origin: 450px 160px; }
      .o3 { animation: float3 7s ease-in-out infinite; transform-origin: 300px 80px; }
    </style>
  </defs>

  <!-- Transparent base — NO background rect, pure glass -->

  <!-- Drifting aurora blobs -->
  <circle class="o1" cx="150" cy="130" r="200" fill="url(#g1)"/>
  <circle class="o2" cx="450" cy="160" r="210" fill="url(#g2)"/>
  <circle class="o3" cx="300" cy="90"  r="160" fill="url(#g3)"/>

  <!-- Name glow shadow layer -->
  <text x="300" y="148"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="88" font-weight="900"
        fill="#6366F1"
        text-anchor="middle"
        letter-spacing="-3"
        opacity="0.45"
        filter="url(#nameGlow)">Redoy</text>

  <!-- Name crisp layer -->
  <text x="300" y="148"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="88" font-weight="900"
        fill="url(#chrome)"
        text-anchor="middle"
        letter-spacing="-3">Redoy</text>

  <!-- Handle — monospace, very muted -->
  <text x="300" y="178"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="12.5" font-weight="400"
        fill="#64748B"
        text-anchor="middle"
        letter-spacing="3.5">@Redooyyy</text>

  <!-- Glowing thin divider line -->
  <rect x="210" y="206" width="180" height="1" fill="url(#div)"/>

  <!-- Tagline -->
  <text x="300" y="235"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="15.5" font-weight="500"
        fill="#CBD5E1"
        text-anchor="middle"
        letter-spacing="0.3">Not waiting for opportunity — building it.</text>

  <!-- Tech stack -->
  <text x="300" y="265"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="10.5" font-weight="400"
        fill="#475569"
        text-anchor="middle"
        letter-spacing="2">BACKEND · MOBILE · OPEN SOURCE · LINUX</text>
</svg>

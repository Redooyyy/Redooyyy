<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- All transparent bg -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C084FC"/>
      <stop offset="45%"  stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#818CF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <style>
      @keyframes floatA {
        0%   { transform: translate(0px,   0px)  scale(1.00); }
        50%  { transform: translate(18px, -20px) scale(1.05); }
        100% { transform: translate(0px,   0px)  scale(1.00); }
      }
      @keyframes floatB {
        0%   { transform: translate(0px,   0px)  scale(1.00); }
        50%  { transform: translate(-15px, 18px) scale(1.08); }
        100% { transform: translate(0px,   0px)  scale(1.00); }
      }
      @keyframes floatC {
        0%   { transform: translate(0px, 0px)   scale(1.00); }
        50%  { transform: translate(10px, 12px) scale(0.95); }
        100% { transform: translate(0px, 0px)   scale(1.00); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1.0; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -30; }
      }
      .orb1 { animation: floatA 9s ease-in-out infinite; }
      .orb2 { animation: floatB 12s ease-in-out infinite; }
      .orb3 { animation: floatC 7s ease-in-out infinite; }
      .blink { animation: pulse 3s ease-in-out infinite; }
      .march { animation: dash 2s linear infinite; }
    </style>
  </defs>

  <!-- Ambient orbs — transparent bg -->
  <circle class="orb1" cx="110"  cy="160" r="120" fill="url(#orb1)"/>
  <circle class="orb2" cx="790"  cy="160" r="130" fill="url(#orb2)"/>
  <circle class="orb3" cx="450"  cy="60"  r="90"  fill="url(#orb3)"/>

  <!-- Grid dot pattern (subtle) -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#818CF8" opacity="0.13"/>
  </pattern>
  <rect width="900" height="320" fill="url(#dots)"/>

  <!-- Marching dashed border — top & bottom accent -->
  <line x1="60" y1="38" x2="840" y2="38"
        stroke="#818CF8" stroke-width="1" stroke-dasharray="6 6"
        stroke-dashoffset="0" opacity="0.35" class="march"/>
  <line x1="60" y1="282" x2="840" y2="282"
        stroke="#38BDF8" stroke-width="1" stroke-dasharray="6 6"
        stroke-dashoffset="0" opacity="0.35" class="march"/>

  <!-- Corner bracket accents -->
  <polyline points="60,60  60,38  82,38"  fill="none" stroke="#C084FC" stroke-width="2.5" opacity="0.8"/>
  <polyline points="818,38 840,38 840,60" fill="none" stroke="#38BDF8" stroke-width="2.5" opacity="0.8"/>
  <polyline points="60,262  60,282  82,282"  fill="none" stroke="#38BDF8" stroke-width="2.5" opacity="0.8"/>
  <polyline points="818,282 840,282 840,262" fill="none" stroke="#C084FC" stroke-width="2.5" opacity="0.8"/>

  <!-- Floating micro-particles -->
  <circle cx="220" cy="55"  r="2.2" fill="#C084FC" opacity="0.7" class="blink"/>
  <circle cx="680" cy="55"  r="1.8" fill="#38BDF8" opacity="0.6" class="blink"/>
  <circle cx="140" cy="270" r="2"   fill="#38BDF8" opacity="0.5" class="blink"/>
  <circle cx="755" cy="270" r="2.2" fill="#C084FC" opacity="0.6" class="blink"/>
  <circle cx="450" cy="290" r="1.6" fill="#818CF8" opacity="0.5" class="blink"/>
  <circle cx="75"  cy="160" r="1.5" fill="#38BDF8" opacity="0.45" class="blink"/>
  <circle cx="825" cy="130" r="1.5" fill="#C084FC" opacity="0.45" class="blink"/>

  <!-- Main name -->
  <text x="450" y="145"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="64" font-weight="700"
        fill="url(#nameGrad)"
        text-anchor="middle"
        letter-spacing="-2"
        filter="url(#glow)">
    Redoy
  </text>

  <!-- Handle -->
  <text x="450" y="180"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="15" font-weight="400"
        fill="#818CF8"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.75">
    @Redooyyy
  </text>

  <!-- Tagline -->
  <text x="450" y="225"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="300"
        fill="url(#tagGrad)"
        text-anchor="middle"
        letter-spacing="1.8"
        filter="url(#subtleGlow)">
    Not waiting for opportunity — building it.
  </text>

  <!-- Sub-tagline / descriptor -->
  <text x="450" y="258"
        font-family="'Georgia',serif"
        font-size="13" font-weight="400"
        fill="#94A3B8"
        text-anchor="middle"
        letter-spacing="0.8"
        font-style="italic">
    Backend  ·  Mobile  ·  Open Source  ·  Linux
  </text>
</svg>

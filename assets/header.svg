<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional soft glow palette -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    
    <!-- Soft, elegant glowing orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#818CF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2DD4BF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <style>
      @keyframes floatA {
        0%   { transform: translate(0px,   0px)  scale(1.00); }
        50%  { transform: translate(12px, -15px) scale(1.02); }
        100% { transform: translate(0px,   0px)  scale(1.00); }
      }
      @keyframes floatB {
        0%   { transform: translate(0px,   0px)  scale(1.00); }
        50%  { transform: translate(-10px, 12px) scale(1.03); }
        100% { transform: translate(0px,   0px)  scale(1.00); }
      }
      @keyframes floatC {
        0%   { transform: translate(0px, 0px)   scale(1.00); }
        50%  { transform: translate(8px, 10px) scale(0.98); }
        100% { transform: translate(0px, 0px)   scale(1.00); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 0.7; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -30; }
      }
      .orb1 { animation: floatA 12s ease-in-out infinite; }
      .orb2 { animation: floatB 15s ease-in-out infinite; }
      .orb3 { animation: floatC 10s ease-in-out infinite; }
      .blink { animation: pulse 4s ease-in-out infinite; }
      .march { animation: dash 3s linear infinite; }
    </style>
  </defs>

  <!-- Ambient orbs -->
  <circle class="orb1" cx="110"  cy="160" r="120" fill="url(#orb1)"/>
  <circle class="orb2" cx="790"  cy="160" r="130" fill="url(#orb2)"/>
  <circle class="orb3" cx="450"  cy="60"  r="90"  fill="url(#orb3)"/>

  <!-- Grid dot pattern (very muted slate) -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#475569" opacity="0.15"/>
  </pattern>
  <rect width="900" height="320" fill="url(#dots)"/>

  <!-- Marching dashed border — top & bottom accent -->
  <line x1="60" y1="38" x2="840" y2="38"
        stroke="#475569" stroke-width="1" stroke-dasharray="6 6"
        stroke-dashoffset="0" opacity="0.4" class="march"/>
  <line x1="60" y1="282" x2="840" y2="282"
        stroke="#475569" stroke-width="1" stroke-dasharray="6 6"
        stroke-dashoffset="0" opacity="0.4" class="march"/>

  <!-- Corner bracket accents (sleek slate/blue) -->
  <polyline points="60,60  60,38  82,38"  fill="none" stroke="#64748B" stroke-width="2" opacity="0.7"/>
  <polyline points="818,38 840,38 840,60" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  <polyline points="60,262  60,282  82,282"  fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>
  <polyline points="818,282 840,282 840,262" fill="none" stroke="#64748B" stroke-width="2" opacity="0.7"/>

  <!-- Floating micro-particles (subdued) -->
  <circle cx="220" cy="55"  r="1.8" fill="#94A3B8" class="blink"/>
  <circle cx="680" cy="55"  r="1.5" fill="#64748B" class="blink"/>
  <circle cx="140" cy="270" r="1.8" fill="#3B82F6" class="blink"/>
  <circle cx="755" cy="270" r="2.0" fill="#94A3B8" class="blink"/>
  <circle cx="450" cy="290" r="1.5" fill="#64748B" class="blink"/>
  <circle cx="75"  cy="160" r="1.5" fill="#3B82F6" class="blink"/>
  <circle cx="825" cy="130" r="1.5" fill="#64748B" class="blink"/>

  <!-- Main name -->
  <text x="450" y="145"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="64" font-weight="700"
        fill="url(#nameGrad)"
        text-anchor="middle"
        letter-spacing="-1"
        filter="url(#glow)">
    Redoy
  </text>

  <!-- Handle -->
  <text x="450" y="180"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="14" font-weight="500"
        fill="#64748B"
        text-anchor="middle"
        letter-spacing="4">
    @Redooyyy
  </text>

  <!-- Tagline -->
  <text x="450" y="225"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="400"
        fill="url(#tagGrad)"
        text-anchor="middle"
        letter-spacing="1.5">
    Not waiting for opportunity — building it.
  </text>

  <!-- Sub-tagline / descriptor -->
  <text x="450" y="258"
        font-family="'Georgia',serif"
        font-size="13" font-weight="400"
        fill="#475569"
        text-anchor="middle"
        letter-spacing="0.8"
        font-style="italic">
    Backend  ·  Mobile  ·  Open Source  ·  Linux
  </text>
</svg>

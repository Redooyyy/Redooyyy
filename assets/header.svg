<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Aurora Gradients -->
    <radialGradient id="aurora1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Sleek Silver/White Gradient for Name -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#94A3B8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <style>
      @keyframes drift1 {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(60px, -40px) scale(1.1); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes drift2 {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-60px, 40px) scale(1.15); }
        100% { transform: translate(0, 0) scale(1); }
      }
      .a1 { animation: drift1 8s ease-in-out infinite; }
      .a2 { animation: drift2 12s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Ambient background blobs -->
  <circle class="a1" cx="150" cy="160" r="220" fill="url(#aurora1)"/>
  <circle class="a2" cx="450" cy="160" r="220" fill="url(#aurora2)"/>
  <circle class="a1" cx="300" cy="60"  r="200" fill="url(#aurora3)"/>

  <!-- Minimalist grid (Very subtle) -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1"/>
  </pattern>
  <rect width="600" height="320" fill="url(#grid)"/>

  <!-- Main name -->
  <text x="300" y="150"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="76" font-weight="800"
        fill="url(#textGrad)"
        text-anchor="middle"
        letter-spacing="-1.5">
    Redoy
  </text>

  <!-- Handle -->
  <text x="300" y="184"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="13" font-weight="400"
        fill="#64748B"
        text-anchor="middle"
        letter-spacing="3">
    @Redooyyy
  </text>

  <!-- Elegant Divider Line -->
  <rect x="200" y="215" width="200" height="1" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text x="300" y="250"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="400"
        fill="#E2E8F0"
        text-anchor="middle"
        letter-spacing="0.5">
    Not waiting for opportunity — building it.
  </text>

  <!-- Sub-tagline / descriptor -->
  <text x="300" y="280"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11.5" font-weight="400"
        fill="#475569"
        text-anchor="middle"
        letter-spacing="1">
    Backend · Mobile · Open Source · Linux
  </text>
</svg>

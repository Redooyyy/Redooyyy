<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card gradients -->
    <linearGradient id="border1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="border2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="border3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818CF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="nameGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="nameGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="nameGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <!-- Tag fills -->
    <linearGradient id="tagLua" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818CF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="tagJava" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="tagFlutter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="tagShell" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34D399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="tagCSS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.10"/>
    </linearGradient>
    <!-- Card bg glow -->
    <radialGradient id="cardGlow1" cx="20%" cy="20%" r="70%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0d1117"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow2" cx="80%" cy="20%" r="70%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0d1117"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow3" cx="20%" cy="80%" r="70%">
      <stop offset="0%"   stop-color="#818CF8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0d1117"  stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <style>
      @keyframes pulse1 { 0%,100%{opacity:.55} 50%{opacity:1} }
      @keyframes pulse2 { 0%,100%{opacity:.45} 50%{opacity:.85} }
      @keyframes pulse3 { 0%,100%{opacity:.5}  50%{opacity:.9} }
      @keyframes starSpin { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
      .p1{animation:pulse1 4s ease-in-out infinite}
      .p2{animation:pulse2 5s ease-in-out infinite}
      .p3{animation:pulse3 6s ease-in-out infinite}
      .star{animation:starSpin 2.5s ease-in-out infinite}
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════
       ROW 1
  ════════════════════════════════════════════ -->

  <!-- CARD 1: flutter-deps.nvim -->
  <rect x="8"   y="8"   width="430" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="8"   y="8"   width="430" height="172" rx="13" fill="url(#cardGlow1)"/>
  <rect x="8"   y="8"   width="430" height="172" rx="13" fill="none" stroke="url(#border1)" stroke-width="1.4" class="p1" filter="url(#softGlow)"/>
  <!-- accent top-left line -->
  <line x1="8" y1="35" x2="438" y2="35" stroke="#C084FC" stroke-width="0.5" opacity="0.2"/>
  <!-- project name -->
  <text x="26" y="32" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad1)" filter="url(#softGlow)">flutter-deps.nvim</text>
  <!-- stars -->
  <polygon points="373,19 375,24 381,24 376,27 378,33 373,29 368,33 370,27 365,24 371,24" fill="#F59E0B" opacity="0.85" class="star" transform="scale(0.75) translate(126,8)"/>
  <text x="391" y="32" font-family="'JetBrains Mono',monospace" font-size="11" fill="#F59E0B" opacity="0.85" class="star">3</text>
  <!-- description -->
  <text x="26" y="60" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">Fuzzy-find and add pub.dev dependencies to your</text>
  <text x="26" y="78" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">Flutter project — version picker included.</text>
  <text x="26" y="96" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">No browser. No copy-paste. Just flow.</text>
  <!-- tags -->
  <rect x="26"  y="115" width="36"  height="20" rx="5" fill="url(#tagLua)"/>
  <rect x="26"  y="115" width="36"  height="20" rx="5" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.5"/>
  <text x="44"  y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#818CF8" text-anchor="middle">Lua</text>

  <rect x="70"  y="115" width="52"  height="20" rx="5" fill="url(#tagFlutter)"/>
  <rect x="70"  y="115" width="52"  height="20" rx="5" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.5"/>
  <text x="96"  y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#38BDF8" text-anchor="middle">Neovim</text>

  <rect x="130" y="115" width="46"  height="20" rx="5" fill="url(#tagFlutter)"/>
  <rect x="130" y="115" width="46"  height="20" rx="5" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.5"/>
  <text x="153" y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#38BDF8" text-anchor="middle">Flutter</text>

  <!-- CARD 2: floatbar-nvim -->
  <rect x="458" y="8"   width="434" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="458" y="8"   width="434" height="172" rx="13" fill="url(#cardGlow2)"/>
  <rect x="458" y="8"   width="434" height="172" rx="13" fill="none" stroke="url(#border2)" stroke-width="1.4" class="p2" filter="url(#softGlow)"/>
  <line x1="458" y1="35" x2="892" y2="35" stroke="#38BDF8" stroke-width="0.5" opacity="0.2"/>
  <text x="476" y="32" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad2)" filter="url(#softGlow)">floatbar-nvim</text>
  <polygon points="820,19 822,24 828,24 823,27 825,33 820,29 815,33 817,27 812,24 818,24" fill="#F59E0B" opacity="0.85" class="star" transform="scale(0.75) translate(292,8)"/>
  <text x="841" y="32" font-family="'JetBrains Mono',monospace" font-size="11" fill="#F59E0B" opacity="0.85" class="star">2</text>
  <text x="476" y="60" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">A floating, persistent terminal panel inside Neovim</text>
  <text x="476" y="78" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">that actually remembers what you were doing.</text>
  <text x="476" y="96" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">Context stays, distractions don't.</text>
  <rect x="476" y="115" width="36"  height="20" rx="5" fill="url(#tagLua)"/>
  <rect x="476" y="115" width="36"  height="20" rx="5" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.5"/>
  <text x="494" y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#818CF8" text-anchor="middle">Lua</text>
  <rect x="520" y="115" width="52"  height="20" rx="5" fill="url(#tagFlutter)"/>
  <rect x="520" y="115" width="52"  height="20" rx="5" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.5"/>
  <text x="546" y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#38BDF8" text-anchor="middle">Neovim</text>
  <rect x="580" y="115" width="56"  height="20" rx="5" fill="url(#tagShell)"/>
  <rect x="580" y="115" width="56"  height="20" rx="5" fill="none" stroke="#34D399" stroke-width="0.7" opacity="0.5"/>
  <text x="608" y="129" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34D399" text-anchor="middle">Terminal</text>

  <!-- ═══════════════════════════════════════════
       ROW 2
  ════════════════════════════════════════════ -->

  <!-- CARD 3: F.L.O.R.A -->
  <rect x="8"   y="196" width="430" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="8"   y="196" width="430" height="172" rx="13" fill="url(#cardGlow3)"/>
  <rect x="8"   y="196" width="430" height="172" rx="13" fill="none" stroke="url(#border3)" stroke-width="1.4" class="p3" filter="url(#softGlow)"/>
  <line x1="8" y1="223" x2="438" y2="223" stroke="#818CF8" stroke-width="0.5" opacity="0.2"/>
  <text x="26" y="220" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad3)" filter="url(#softGlow)">F.L.O.R.A</text>
  <text x="26" y="248" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">A Java project — because sometimes you build</text>
  <text x="26" y="266" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">something and let the name do the talking.</text>
  <text x="26" y="284" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">The name is an acronym. The code does the rest.</text>
  <rect x="26"  y="303" width="40"  height="20" rx="5" fill="url(#tagJava)"/>
  <rect x="26"  y="303" width="40"  height="20" rx="5" fill="none" stroke="#F59E0B" stroke-width="0.7" opacity="0.5"/>
  <text x="46"  y="317" font-family="'JetBrains Mono',monospace" font-size="11" fill="#F59E0B" text-anchor="middle">Java</text>

  <!-- CARD 4: Reoo-s-Dev-Env -->
  <rect x="458" y="196" width="434" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="458" y="196" width="434" height="172" rx="13" fill="url(#cardGlow1)"/>
  <rect x="458" y="196" width="434" height="172" rx="13" fill="none" stroke="url(#border1)" stroke-width="1.4" class="p1" filter="url(#softGlow)"/>
  <line x1="458" y1="223" x2="892" y2="223" stroke="#C084FC" stroke-width="0.5" opacity="0.2"/>
  <text x="476" y="220" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad1)" filter="url(#softGlow)">Reoo-s-Dev-Env</text>
  <text x="476" y="248" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">My entire development environment, scripted and</text>
  <text x="476" y="266" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">version-controlled. A developer's environment is</text>
  <text x="476" y="284" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">as personal as their handwriting.</text>
  <rect x="476" y="303" width="36"  height="20" rx="5" fill="url(#tagLua)"/>
  <rect x="476" y="303" width="36"  height="20" rx="5" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.5"/>
  <text x="494" y="317" font-family="'JetBrains Mono',monospace" font-size="11" fill="#818CF8" text-anchor="middle">Lua</text>
  <rect x="520" y="303" width="46"  height="20" rx="5" fill="url(#tagShell)"/>
  <rect x="520" y="303" width="46"  height="20" rx="5" fill="none" stroke="#34D399" stroke-width="0.7" opacity="0.5"/>
  <text x="543" y="317" font-family="'JetBrains Mono',monospace" font-size="11" fill="#34D399" text-anchor="middle">Shell</text>

  <!-- ═══════════════════════════════════════════
       ROW 3
  ════════════════════════════════════════════ -->

  <!-- CARD 5: nvim-reo-sticky -->
  <rect x="8"   y="384" width="430" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="8"   y="384" width="430" height="172" rx="13" fill="url(#cardGlow2)"/>
  <rect x="8"   y="384" width="430" height="172" rx="13" fill="none" stroke="url(#border2)" stroke-width="1.4" class="p2" filter="url(#softGlow)"/>
  <line x1="8" y1="411" x2="438" y2="411" stroke="#38BDF8" stroke-width="0.5" opacity="0.2"/>
  <text x="26" y="408" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad2)" filter="url(#softGlow)">nvim-reo-sticky</text>
  <text x="26" y="436" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">Sticky notes inside Neovim. Because sometimes</text>
  <text x="26" y="454" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">the best TODO manager is the one you never</text>
  <text x="26" y="472" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">have to leave your editor to use.</text>
  <rect x="26"  y="491" width="36"  height="20" rx="5" fill="url(#tagLua)"/>
  <rect x="26"  y="491" width="36"  height="20" rx="5" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.5"/>
  <text x="44"  y="505" font-family="'JetBrains Mono',monospace" font-size="11" fill="#818CF8" text-anchor="middle">Lua</text>
  <rect x="70"  y="491" width="52"  height="20" rx="5" fill="url(#tagFlutter)"/>
  <rect x="70"  y="491" width="52"  height="20" rx="5" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.5"/>
  <text x="96"  y="505" font-family="'JetBrains Mono',monospace" font-size="11" fill="#38BDF8" text-anchor="middle">Neovim</text>

  <!-- CARD 6: Reoo-s-Dotfiles -->
  <rect x="458" y="384" width="434" height="172" rx="13" fill="#0d1117" fill-opacity="0.65"/>
  <rect x="458" y="384" width="434" height="172" rx="13" fill="url(#cardGlow3)"/>
  <rect x="458" y="384" width="434" height="172" rx="13" fill="none" stroke="url(#border3)" stroke-width="1.4" class="p3" filter="url(#softGlow)"/>
  <line x1="458" y1="411" x2="892" y2="411" stroke="#818CF8" stroke-width="0.5" opacity="0.2"/>
  <text x="476" y="408" font-family="'JetBrains Mono','Courier New',monospace" font-size="15" font-weight="700" fill="url(#nameGrad3)" filter="url(#softGlow)">Reoo-s-Dotfiles</text>
  <polygon points="820,394 822,399 828,399 823,402 825,408 820,404 815,408 817,402 812,399 818,399" fill="#F59E0B" opacity="0.85" class="star" transform="scale(0.75) translate(292,196)"/>
  <text x="841" y="408" font-family="'JetBrains Mono',monospace" font-size="11" fill="#F59E0B" opacity="0.85" class="star">1</text>
  <text x="476" y="436" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">My Linux dotfiles — Hyprland, Waybar, Neovim,</text>
  <text x="476" y="454" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#94A3B8">everything tuned exactly how I want it.</text>
  <text x="476" y="472" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#64748B">The desktop is a canvas. This is my art.</text>
  <rect x="476" y="491" width="36"  height="20" rx="5" fill="url(#tagLua)"/>
  <rect x="476" y="491" width="36"  height="20" rx="5" fill="none" stroke="#818CF8" stroke-width="0.7" opacity="0.5"/>
  <text x="494" y="505" font-family="'JetBrains Mono',monospace" font-size="11" fill="#818CF8" text-anchor="middle">Lua</text>
  <rect x="520" y="491" width="36"  height="20" rx="5" fill="url(#tagCSS)"/>
  <rect x="520" y="491" width="36"  height="20" rx="5" fill="none" stroke="#C084FC" stroke-width="0.7" opacity="0.5"/>
  <text x="538" y="505" font-family="'JetBrains Mono',monospace" font-size="11" fill="#C084FC" text-anchor="middle">CSS</text>
  <rect x="564" y="491" width="42"  height="20" rx="5" fill="url(#tagFlutter)"/>
  <rect x="564" y="491" width="42"  height="20" rx="5" fill="none" stroke="#38BDF8" stroke-width="0.7" opacity="0.5"/>
  <text x="585" y="505" font-family="'JetBrains Mono',monospace" font-size="11" fill="#38BDF8" text-anchor="middle">JSON</text>
